services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      # Trwała konfiguracja per-serwer (głośność, rola DJ, AutoPlay).
      # Bez tego ustawienia ginęły przy każdym przebudowaniu kontenera.
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
      lavalink:
        condition: service_healthy

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    restart: unless-stopped
    environment:
      # Podstawiane w application.yml jako ${LAVALINK_SERVER_PASSWORD}.
      - LAVALINK_SERVER_PASSWORD=${NYXIO_LAVALINK_PASSWORD:-youshallnotpass}
      # OAuth youtube-source. Puste przy 1. starcie (device-login w logach),
      # potem wklej token do .env jako NYXIO_YOUTUBE_REFRESH_TOKEN.
      - YOUTUBE_REFRESH_TOKEN=${NYXIO_YOUTUBE_REFRESH_TOKEN:-}
      # Obsluga poToken z pliku .env (zmienne NYXIO_PO_TOKEN i NYXIO_VISITOR_DATA)
      - YOUTUBE_PO_TOKEN=${NYXIO_PO_TOKEN:-}
      - YOUTUBE_VISITOR_DATA=${NYXIO_VISITOR_DATA:-}
      # Haslo do zdalnego cipher (yt-cipher). Musi byc takie samo jak API_TOKEN
      # serwisu yt-cipher. Lavalink czyta je w application.yml jako
      # ${YOUTUBE_REMOTE_CIPHER_PASSWORD}.
      - YOUTUBE_REMOTE_CIPHER_PASSWORD=${NYXIO_YTCIPHER_TOKEN:-changeme}
      - _JAVA_OPTIONS=-Xmx1g -Xms1g
    depends_on:
      yt-cipher:
        condition: service_started
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
      # UWAGA: NIE montować /opt/Lavalink/plugins. Każdy mount (bind/named)
      # jest root-owned i blokuje zapis wtyczki przez użytkownika 'lavalink'
      # (Permission denied). Bez mountu Lavalink pobiera plugin do katalogu
      # w obrazie (~1 MB, tylko przy (re)tworzeniu kontenera).
    healthcheck:
      # Lavalink posiada endpoint /version lub /
      test:
        [
          "CMD-SHELL",
          'wget --no-verbose --tries=1 --spider --header="Authorization: $${LAVALINK_SERVER_PASSWORD}" http://localhost:2333/version || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # Zdalny deszyfrator sygnatur YouTube. Lokalny parser w youtube-source
  # 1.18.1 nie ogarnia najnowszego player-script (blad "must find sig
  # function") — yt-cipher liczy sygnature po stronie serwera. Bez portu
  # na hosta: Lavalink siega po sieci compose (http://yt-cipher:8001).
  yt-cipher:
    image: ghcr.io/kikkia/yt-cipher:master
    restart: unless-stopped
    environment:
      - API_TOKEN=${NYXIO_YTCIPHER_TOKEN:-changeme}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
