server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "${LAVALINK_SERVER_PASSWORD}"
    sources:
      # Wbudowany YouTube usunięty w v4 — obsługuje go wtyczka youtube-source.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      # Filtry potrzebne dla /filter (EQ/bass/nightcore).
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Klienci zgodni z OAuth (inaczej token nie jest używany do żądań
    # i wraca "This video requires login"). Kolejność = priorytet.
    clients:
      - TV
      - TVHTML5EMBEDDED
      - MUSIC
      - WEB
    # OAuth obchodzi blokadę "This video requires login" na IP VPS.
    # 1. start z pustym tokenem -> w logach pojawi się link+kod do
    #    autoryzacji (zaloguj BURNER konto Google).
    # 2. plugin wypisze refreshToken -> wstaw go do .env jako
    #    NYXIO_YOUTUBE_REFRESH_TOKEN i zrestartuj (przeżywa restart).
    oauth:
      enabled: true
      refreshToken: "${YOUTUBE_REFRESH_TOKEN:}"

logging:
  level:
    root: INFO
    lavalink: INFO
