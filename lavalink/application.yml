server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "${LAVALINK_SERVER_PASSWORD}"
    sources:
      # Wbudowany YouTube usunięty w v4 — obsługuje go wtyczka youtube-source.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      # Filtry potrzebne dla /filter (EQ/bass/nightcore).
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Kolejnosc = priorytet. Wg tabeli youtube-source: tylko WEB/WEBEMBEDDED
    # uzywaja poTokena; TV jest jedynym klientem OAuth, ale NIE laduje wideo
    # (tylko playback). IOS/TVHTML5_SIMPLY/ANDROID_VR laduja wideo bez POT i
    # bez OAuth — proba zanim padnie na WEB+POT. TV na koncu = playback OAuth.
    clients:
      - TVHTML5_SIMPLY
      - IOS
      - ANDROID_VR
      - WEB
      - WEBEMBEDDED
      - MUSIC
      - TV
    # Zdalny deszyfrator sygnatur. Lokalny parser w 1.18.1 nie ogarnia
    # najnowszego player-script ("must find sig function") — sygnature
    # liczy serwis yt-cipher (sidecar w docker-compose, siec compose).
    # password musi byc rowne API_TOKEN yt-cipher (oba z NYXIO_YTCIPHER_TOKEN).
    remoteCipher:
      url: "http://yt-cipher:8001"
      password: "${YOUTUBE_REMOTE_CIPHER_PASSWORD:}"
      userAgent: "nyxio"
    # OAuth wlaczone:
    oauth:
      enabled: true
      refreshToken: "${YOUTUBE_REFRESH_TOKEN:}"
    # Technologia poToken wymuszona z pliku .env
    pot:
      token: "${YOUTUBE_PO_TOKEN:}"
      visitorData: "${YOUTUBE_VISITOR_DATA:}"

logging:
  level:
    root: INFO
    lavalink: INFO
